<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Pointage"/>
<title>Pointage Heures</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#2c2c2a;min-height:100vh}
.header{background:#2c2c2a;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10}
.header-title{font-size:16px;font-weight:600}
.header-sub{font-size:12px;opacity:.6}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0dfd8;overflow-x:auto}
.tab{flex:1;min-width:80px;padding:12px 8px;font-size:13px;text-align:center;cursor:pointer;border:none;background:none;color:#888;white-space:nowrap}
.tab.active{color:#2c2c2a;font-weight:600;border-bottom:2px solid #2c2c2a}
.section{display:none;padding:16px;max-width:600px;margin:0 auto}
.section.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
label{font-size:12px;color:#888;font-weight:500;display:block;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
select,input,textarea{width:100%;padding:10px 12px;border:1px solid #e0dfd8;border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:#2c2c2a;-webkit-appearance:none}
textarea{min-height:70px;resize:vertical}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;font-size:15px;border-radius:10px;cursor:pointer;font-family:inherit;border:none;font-weight:500;width:100%;margin-top:14px}
.btn-primary{background:#2c2c2a;color:#fff}
.btn-secondary{background:#f0ede6;color:#2c2c2a;margin-top:8px}
.badge-h{background:#eaf3de;color:#3b6d11;display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.msg-ok{background:#eaf3de;color:#3b6d11;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px}
.msg-err{background:#fcebeb;color:#a32d2d;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px}
.entry{padding:12px 0;border-bottom:1px solid #f0ede6}
.entry:last-child{border-bottom:none}
.entry-top{display:flex;align-items:center;gap:8px}
.entry-name{font-weight:600;font-size:14px;flex:1}
.entry-detail{font-size:13px;color:#888;margin-top:3px}
.del-btn{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0}
.del-btn:active{color:#a32d2d}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:14px;text-align:center}
.stat-n{font-size:26px;font-weight:600}
.stat-l{font-size:12px;color:#888;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;color:#888;font-weight:500;border-bottom:1px solid #f0ede6;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0ede6}
tr:last-child td{border-bottom:none}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.input-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
.tag{display:inline-flex;align-items:center;gap:6px;background:#f0ede6;border-radius:20px;padding:5px 12px;font-size:13px;margin:4px}
.del{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px}
.admin-bar{background:#2c2c2a;color:#f0ede6;padding:6px 16px;font-size:11px;text-align:center;letter-spacing:.5px}
.user-bar{background:#f0ede6;padding:8px 16px;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.change-btn{font-size:12px;color:#888;background:none;border:none;cursor:pointer;text-decoration:underline}
.login-screen{padding:2rem 16px;max-width:400px;margin:0 auto}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">Pointage Heures</div>
  <div class="header-sub" id="header-date"></div>
</div>
<div id="admin-bar" class="admin-bar" style="display:none">MODE ADMINISTRATEUR</div>
<div id="user-bar" class="user-bar" style="display:none">
  <span id="user-bar-name"></span>
  <button class="change-btn" onclick="logout()">Changer</button>
</div>

<!-- Ecran de connexion -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="card">
    <div style="font-size:17px;font-weight:500;margin-bottom:6px">Qui êtes-vous ?</div>
    <p style="font-size:13px;color:#888;margin-bottom:1rem">Sélectionnez votre nom pour continuer</p>
    <label style="margin-top:0">Votre nom</label>
    <select id="login-select">
      <option value="">-- Sélectionnez votre nom --</option>
    </select>
    <button class="btn btn-primary" onclick="doLogin()">Continuer</button>
  </div>
</div>

<!-- Application principale -->
<div id="main-app" style="display:none">
  <div class="tabs">
    <button class="tab active" onclick="showTab('saisie',this)">Saisie</button>
    <button class="tab" id="btn-journal" onclick="showTab('journal',this)">Journal</button>
    <button class="tab" onclick="showTab('synthese',this)">Synthèse</button>
    <button class="tab" onclick="showTab('config',this)">Paramètres</button>
  </div>

  <!-- SAISIE -->
  <div id="tab-saisie" class="section active">
    <div id="msg"></div>
    <div class="card">
      <label>Date</label>
      <input type="date" id="inp-date" onchange="renderDayTotal(this.value)"/>
      <label>Chantier</label>
      <select id="sel-chantier"></select>
      <label>Heures travaillées</label>
      <input type="number" id="inp-heures" min="0.5" max="24" step="0.5" placeholder="ex : 7.5"/>
      <label>Remarque (optionnel)</label>
      <textarea id="inp-note" placeholder="Travaux effectués..."></textarea>
      <button class="btn btn-primary" onclick="submitEntry()">Enregistrer</button>
    </div>
    <div id="today-list"></div>
  </div>

  <!-- JOURNAL -->
  <div id="tab-journal" class="section">
    <div class="card" style="padding:12px">
      <select id="f-ouvrier" onchange="renderJournal()" style="margin-bottom:8px"><option value="">Tous les salariés</option></select>
      <select id="f-chantier" onchange="renderJournal()"><option value="">Tous les chantiers</option></select>
    </div>
    <div class="card" style="padding:0 16px" id="journal-list"><div style="padding:1rem;color:#888;font-size:13px">Chargement...</div></div>
    <button class="btn btn-secondary" onclick="exportCSV()">Exporter CSV (Excel)</button>
  </div>

  <!-- SYNTHESE -->
  <div id="tab-synthese" class="section">
    <div class="card" style="padding:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label style="margin-top:0">Du</label><input type="date" id="s-from" onchange="renderSynthese()"/></div>
        <div><label style="margin-top:0">Au</label><input type="date" id="s-to" onchange="renderSynthese()"/></div>
      </div>
      <div id="s-ouvrier-group">
        <label>Salarié</label>
        <select id="s-ouvrier" onchange="renderSynthese()" style="margin-bottom:8px"><option value="">Tous les salariés</option></select>
      </div>
      <label>Chantier</label>
      <select id="s-chantier" onchange="renderSynthese()"><option value="">Tous les chantiers</option></select>
    </div>
    <div class="stat-grid" id="stat-cards"></div>
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div style="padding:12px 14px 8px;font-size:13px;font-weight:500;border-bottom:1px solid #f0ede6">Par salarié</div>
      <table><thead><tr><th>Salarié</th><th>Heures</th><th>Jours</th></tr></thead><tbody id="body-ouvrier"></tbody></table>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 14px 8px;font-size:13px;font-weight:500;border-bottom:1px solid #f0ede6">Par chantier</div>
      <table><thead><tr><th>Chantier</th><th>Heures</th></tr></thead><tbody id="body-chantier"></tbody></table>
    </div>
  </div>

  <!-- PARAMETRES -->
  <div id="tab-config" class="section">
    <div class="card">
      <div style="font-weight:500;margin-bottom:12px">Salariés</div>
      <div class="input-row">
        <input type="text" id="new-ouvrier" placeholder="Prénom Nom"/>
        <button class="btn btn-primary" style="width:auto;margin-top:0;padding:10px 16px" onclick="addOuvrier()">+</button>
      </div>
      <div id="ouvrier-tags" style="margin-top:10px"></div>
    </div>
    <div class="card">
      <div style="font-weight:500;margin-bottom:12px">Chantiers</div>
      <div class="input-row">
        <input type="text" id="new-chantier" placeholder="Nom du chantier"/>
        <button class="btn btn-primary" style="width:auto;margin-top:0;padding:10px 16px" onclick="addChantier()">+</button>
      </div>
      <div id="chantier-tags" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<script>
const URL_BASE = "https://xxosvhsuuezkhemkmiga.supabase.co/rest/v1/pointage";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4b3N2aHN1dWV6a2hlbWttaWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NzIsImV4cCI6MjA5MjQ2Mzc3Mn0.uaO8PMZxBd9-uuytO5rgE-j0kN6uwtMIBDeTnZk8j9w";
const H = {"Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY};
const isAdmin = window.location.search.includes('admin');

let cfg = JSON.parse(localStorage.getItem('mn_cfg')||'null') || {
  ouvriers:['Martin Dupont','Lucas Bernard','Thomas Leroy','Julien Moreau','Antoine Simon'],
  chantiers:['Residence Les Chenes','Mairie de Versailles','Villa Beaumont','Ecole primaire Nord']
};
let currentUser = null;
let rows = [];

function saveCfg(){ localStorage.setItem('mn_cfg', JSON.stringify(cfg)); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){ if(!d)return''; const [y,m,j]=d.split('-'); return j+'/'+m+'/'+y; }

function init(){
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const mon=new Date(); mon.setDate(mon.getDate()-mon.getDay()+1);
  document.getElementById('s-from').value = mon.toISOString().split('T')[0];
  document.getElementById('s-to').value = today();
  document.getElementById('inp-date').value = today();
  if(isAdmin) document.getElementById('admin-bar').style.display='block';
  showLogin();
}

function showLogin(){
  document.getElementById('login-screen').style.display='block';
  document.getElementById('main-app').style.display='none';
  document.getElementById('user-bar').style.display='none';
  const sel = document.getElementById('login-select');
  sel.innerHTML = '<option value="">-- Sélectionnez votre nom --</option>';
  cfg.ouvriers.forEach(o=>{
    const op=document.createElement('option');
    op.value=op.textContent=o;
    sel.appendChild(op);
  });
}

function doLogin(){
  const v = document.getElementById('login-select').value;
  if(!v){ return; }
  currentUser = v;
  showApp();
}

function logout(){
  currentUser = null;
  showLogin();
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('user-bar').style.display='flex';
  document.getElementById('user-bar-name').textContent = 'Connecté : ' + currentUser;
  if(!isAdmin){
    document.getElementById('btn-journal').style.display='none';
    document.getElementById('s-ouvrier-group').style.display='none';
  }
  populateSelects();
  load().then(()=>renderDayTotal(today()));
}

function showMsg(txt, ok){
  const el=document.getElementById('msg');
  el.innerHTML='<div class="'+(ok?'msg-ok':'msg-err')+'">'+txt+'</div>';
  setTimeout(()=>el.innerHTML='',3000);
}

function populateSelects(){
  ['f-ouvrier','s-ouvrier'].forEach(id=>{
    const s=document.getElementById(id), c=s.value;
    s.innerHTML='<option value="">Tous les salariés</option>';
    cfg.ouvriers.forEach(o=>{const op=document.createElement('option');op.value=op.textContent=o;s.appendChild(op);});
    if(c) s.value=c;
  });
  ['sel-chantier','f-chantier','s-chantier'].forEach(id=>{
    const s=document.getElementById(id), c=s.value;
    s.innerHTML=id.startsWith('f-')||id.startsWith('s-')?'<option value="">Tous les chantiers</option>':'';
    cfg.chantiers.forEach(o=>{const op=document.createElement('option');op.value=op.textContent=o;s.appendChild(op);});
    if(c) s.value=c;
  });
}

async function load(){
  try{
    const r=await fetch(URL_BASE+"?select=*&order=date.desc,id.desc",{headers:H});
    const json=await r.json();
    rows=Array.isArray(json)?json:[];
  }catch(e){rows=[];}
}

async function submitEntry(){
  if(!currentUser){showMsg('Veuillez vous connecter',false);return;}
  const date=document.getElementById('inp-date').value;
  const chantier=document.getElementById('sel-chantier').value;
  const heures=parseFloat(document.getElementById('inp-heures').value);
  const note=document.getElementById('inp-note').value.trim();
  if(!date||!chantier||!heures||heures<=0){showMsg('Merci de remplir tous les champs',false);return;}
  try{
    const r=await fetch(URL_BASE,{
      method:'POST',
      headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({date, ouvrier:currentUser, chantier, heures, note})
    });
    if(r.ok||r.status===201){
      document.getElementById('inp-heures').value='';
      document.getElementById('inp-note').value='';
      showMsg('Enregistré !',true);
      await load();
      renderDayTotal(date);
    } else {
      const err=await r.text();
      showMsg('Erreur : '+err,false);
    }
  }catch(e){showMsg('Erreur de connexion',false);}
}

async function deleteEntry(id, owner){
  if(!isAdmin && owner !== currentUser){showMsg('Vous ne pouvez supprimer que vos propres saisies',false);return;}
  if(!confirm('Supprimer cette saisie ?')) return;
  try{
    const r=await fetch(URL_BASE+'?id=eq.'+id,{method:'DELETE',headers:H});
    if(r.ok){
      showMsg('Saisie supprimée',true);
      await load();
      const d=document.getElementById('inp-date').value||today();
      renderDayTotal(d);
      if(isAdmin) renderJournal();
    }
  }catch(e){showMsg('Erreur de suppression',false);}
}

function renderDayTotal(d){
  if(!d) return;
  const list = isAdmin
    ? rows.filter(e=>e.date===d)
    : rows.filter(e=>e.date===d && e.ouvrier===currentUser);
  const el=document.getElementById('today-list');
  if(!list.length){el.innerHTML='';return;}
  const total=list.reduce((s,e)=>s+e.heures,0);
  const label = d===today() ? "Saisies du jour" : "Saisies du "+fmt(d);
  el.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin:4px 0 8px">'+
    '<span style="font-size:13px;font-weight:500;color:#888">'+label+'</span>'+
    '<span class="badge-h">Total : '+total+'h</span>'+
    '</div>'+
    '<div class="card" style="padding:0 16px">'+
    list.map(e=>`<div class="entry"><div class="entry-top">
      ${isAdmin?`<span class="entry-name">${e.ouvrier}</span>`:'<span class="entry-name">'+e.chantier+'</span>'}
      <span class="badge-h">${e.heures}h</span>
      <button class="del-btn" onclick="deleteEntry(${e.id},'${e.ouvrier}')">×</button>
    </div><div class="entry-detail">${isAdmin?e.chantier+' — ':''} ${fmt(e.date)}${e.note?' — '+e.note:''}</div></div>`).join('')+
    '</div>';
}

function renderJournal(){
  const ov=document.getElementById('f-ouvrier').value;
  const ch=document.getElementById('f-chantier').value;
  const list=rows.filter(e=>(!ov||e.ouvrier===ov)&&(!ch||e.chantier===ch));
  const el=document.getElementById('journal-list');
  if(!list.length){el.innerHTML='<div class="empty">Aucune entrée</div>';return;}
  el.innerHTML=list.map(e=>`<div class="entry"><div class="entry-top">
    <span class="entry-name">${e.ouvrier}</span>
    <span class="badge-h">${e.heures}h</span>
    <button class="del-btn" onclick="deleteEntry(${e.id},'${e.ouvrier}')">×</button>
  </div><div class="entry-detail">${fmt(e.date)} — ${e.chantier}${e.note?' — '+e.note:''}</div></div>`).join('');
}

function getSynth(){
  const df=document.getElementById('s-from').value;
  const dt=document.getElementById('s-to').value;
  const ov=isAdmin ? document.getElementById('s-ouvrier').value : currentUser;
  const ch=document.getElementById('s-chantier').value;
  return rows.filter(e=>(!df||e.date>=df)&&(!dt||e.date<=dt)&&(!ov||e.ouvrier===ov)&&(!ch||e.chantier===ch));
}

function renderSynthese(){
  const list=getSynth();
  const totalH=list.reduce((s,e)=>s+e.heures,0);
  const jours=new Set(list.map(e=>e.date)).size;
  document.getElementById('stat-cards').innerHTML=
    `<div class="stat"><div class="stat-n">${totalH}h</div><div class="stat-l">Heures totales</div></div>
     <div class="stat"><div class="stat-n">${jours}</div><div class="stat-l">Jours travaillés</div></div>`;
  const byOv={};
  list.forEach(e=>{if(!byOv[e.ouvrier])byOv[e.ouvrier]={h:0,j:new Set()};byOv[e.ouvrier].h+=e.heures;byOv[e.ouvrier].j.add(e.date);});
  document.getElementById('body-ouvrier').innerHTML=
    Object.entries(byOv).sort((a,b)=>b[1].h-a[1].h)
    .map(([o,v])=>`<tr><td style="font-weight:500">${o}</td><td><span class="badge-h">${v.h}h</span></td><td>${v.j.size}</td></tr>`).join('')
    ||'<tr><td colspan="3" class="empty">Aucune donnée</td></tr>';
  const byCh={};
  list.forEach(e=>{if(!byCh[e.chantier])byCh[e.chantier]=0;byCh[e.chantier]+=e.heures;});
  document.getElementById('body-chantier').innerHTML=
    Object.entries(byCh).sort((a,b)=>b[1]-a[1])
    .map(([c,h])=>`<tr><td style="font-weight:500">${c}</td><td><span class="badge-h">${h}h</span></td></tr>`).join('')
    ||'<tr><td colspan="2" class="empty">Aucune donnée</td></tr>';
}

function renderConfig(){
  document.getElementById('ouvrier-tags').innerHTML=cfg.ouvriers.map((o,i)=>
    `<span class="tag">${o}<button class="del" onclick="delOuvrier(${i})">×</button></span>`).join('');
  document.getElementById('chantier-tags').innerHTML=cfg.chantiers.map((c,i)=>
    `<span class="tag">${c}<button class="del" onclick="delChantier(${i})">×</button></span>`).join('');
}

function addOuvrier(){const v=document.getElementById('new-ouvrier').value.trim();if(!v)return;cfg.ouvriers.push(v);saveCfg();document.getElementById('new-ouvrier').value='';populateSelects();renderConfig();}
function delOuvrier(i){cfg.ouvriers.splice(i,1);saveCfg();populateSelects();renderConfig();}
function addChantier(){const v=document.getElementById('new-chantier').value.trim();if(!v)return;cfg.chantiers.push(v);saveCfg();document.getElementById('new-chantier').value='';populateSelects();renderConfig();}
function delChantier(i){cfg.chantiers.splice(i,1);saveCfg();populateSelects();renderConfig();}

function exportCSV(){
  if(!rows.length){alert('Aucune donnée');return;}
  const r=[['Date','Salarié','Chantier','Heures','Remarque']];
  rows.forEach(e=>r.push([fmt(e.date),e.ouvrier,e.chantier,e.heures,e.note||'']));
  const csv=r.map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='pointage.csv';a.click();
}

async function showTab(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  await load();
  if(name==='journal') renderJournal();
  if(name==='synthese') renderSynthese();
  if(name==='config') renderConfig();
  if(name==='saisie') renderDayTotal(document.getElementById('inp-date').value||today());
}

init();
</script>
</body>
</html>
